name: 构建精简绿色版(15MB内)并发布 Releases
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖（仅生产环境）
        run: npm install --omit=dev

      - name: 生成 Prisma 客户端
        run: npx prisma generate

      - name: 构建项目
        run: npm run build

      - name: 精简打包（仅15MB内）
        uses: actions/upload-artifact@v4
        with:
          name: 报销系统_绿色精简版
          path: |
            .output
            prisma
            package.json

      - name: 发布到 Releases
        uses: softprops/action-gh-release@v2
        with:
          files: "报销系统_绿色精简版.zip"
          name: 报销系统 v1.0.0 绿色免安装版
          tag_name: v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
