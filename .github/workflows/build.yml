name: 构建 Windows 绿色免安装版
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install

      - name: 生成 Prisma 客户端
        run: npx prisma generate

      - name: 构建项目
        run: npm run build

      - name: 打包完整绿色版
        uses: actions/upload-artifact@v4
        with:
          name: 报销系统_绿色版
          path: |
            .output
            node_modules
            prisma
            package.json
            public
