name: 构建完整绿色版并发布到Releases
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install

      - name: 生成 Prisma 客户端
        run: npx prisma generate

      - name: 构建项目
        run: npm run build

      # 创建启动脚本（双击运行）
      - name: 创建启动脚本
        run: |
          echo node .output/server/index.mjs > 启动.bat

      # 打包完整文件
      - name: 准备文件并压缩
        run: |
          mkdir 报销系统
          xcopy /E /I .output 报销系统\.output
          xcopy /E /I prisma 报销系统\prisma
          copy package.json 报销系统\
          copy 启动.bat 报销系统\
          Compress-Archive -Path 报销系统 -DestinationPath 报销系统_绿色版.zip

      # 发布到 Release
      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: 报销系统_绿色版.zip
          name: 报销系统 v1.0.0 绿色版
          tag_name: v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
