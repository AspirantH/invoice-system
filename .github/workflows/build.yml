name: 编译并发布到 Releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装依赖
        run: npm install

      - name: 构建前端
        run: npm run build

      - name: 编译 Tauri
        run: tauri build

      # 🔥 发布
      - name: 发布
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/invoice-system.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
