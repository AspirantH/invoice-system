name: 构建
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install

      - name: 生成 Prisma 客户端
        run: npx prisma generate

      - name: 构建项目
        run: npm run build

      # 创建启动脚本
      - name: 创建启动脚本
        run: echo @node.exe .output/server/index.mjs > 启动.bat

      # 复制 Node.exe 到打包目录（关键！）
      - name: 复制 Node 运行时
        uses: actions/upload-artifact@v4
        with:
          name: 报销系统
          path: |
            .output
            prisma
            package.json
            启动.bat
            ${{ steps.setup-node.outputs.node-path }}/node.exe

      # 发布到 Release
      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: "报销系统.zip"
          name: 报销系统 v1.0.0
          tag_name: v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
