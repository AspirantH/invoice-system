name: 编译 Windows 绿色单文件 exe

on:
  workflow_dispatch:    # 手动触发编译（你只需要点一下）
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 安装项目依赖
        run: npm install

      - name: 安装 Tauri
        run: npm install -g @tauri-apps/cli

      - name: 初始化 Tauri（如已初始化可跳过）
        run: npx tauri init --yes --frontend-dev npm run dev --frontend-build npm run build --dist-dir .output/public --dev-url http://localhost:3000

      - name: 生成 Prisma 客户端
        run: npx prisma generate

      - name: 编译 绿色单文件 exe
        run: |
          npm run build
          npx tauri build --bundle compact

      - name: 上传 绿色单文件 exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-single-exe
          path: src-tauri/target/release/bundle/msi/
