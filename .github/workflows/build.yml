name: 构建Windows终极绿色版(自带Node)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install

      - name: 生成 Prisma 客户端
        run: npx prisma generate

      - name: 构建项目
        run: npm run build

      # ✅ 创建启动脚本
      - name: 创建 启动.bat
        run: |
          "@echo off" > 启动.bat
          "node.exe .output/server/index.mjs" >> 启动.bat

      # ✅ 直接拷贝系统里的 node.exe 到当前目录
      - name: 拷贝 Node 运行环境
        run: Copy-Item (Get-Command node).Source ./

      # ✅ 打包所有文件（自带node，用户不用装任何环境）
      - name: 压缩成 ZIP
        run: Compress-Archive -Path @("node.exe","启动.bat",".output","prisma","package.json") 报销系统_绿色终极版.zip

      # ✅ 发布到 Releases
      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: 报销系统_绿色终极版.zip
          name: 报销系统 v1.0.0 绿色免安装版
          tag_name: v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
