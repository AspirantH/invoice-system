name: 构建完整独立绿色版(自带Node)
on:
  workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        id: setup-node
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install

      - name: 生成 Prisma 客户端
        run: npx prisma generate

      - name: 构建项目
        run: npm run build

      # 🔥 修复：PowerShell 正确生成 bat 文件
      - name: 创建启动脚本
        run: |
          "@echo off" > 启动.bat
          "node.exe .output/server/index.mjs" >> 启动.bat

      # 复制 Node.exe + 全部文件
      - name: 准备完整绿色包
        run: |
          mkdir 发布包
          copy "${{ steps.setup-node.outputs.node-path }}" 发布包\
          xcopy /E /I .output 发布包\.output
          xcopy /E /I prisma 发布包\prisma
          copy package.json 发布包\
          copy 启动.bat 发布包\

      # 压缩 ZIP
      - name: 压缩成最终 ZIP
        run: Compress-Archive -Path 发布包 -DestinationPath 报销系统_绿色终极版.zip

      # 发布到 Releases
      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: 报销系统_绿色终极版.zip
          name: 报销系统 v1.0.0 绿色免安装版
          tag_name: v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
