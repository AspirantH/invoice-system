name: 构建Windows绿色精简版 并发布到Releases
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 正常安装所有依赖（不裁剪，保证不报错）
      - name: 安装依赖
        run: npm install

      - name: 生成 Prisma 客户端
        run: npx prisma generate

      - name: 构建项目
        run: npm run build

      # ✅ 只打包运行必需文件，体积最小、不报错、全功能正常
      - name: 打包精简绿色版
        uses: actions/upload-artifact@v4
        with:
          name: 报销系统_绿色版
          path: |
            .output
            prisma
            package.json

      # ✅ 自动发布到 Releases
      - name: 发布到 GitHub Releases
        uses: softprops/gh-release@v2
        with:
          files: "报销系统_绿色版.zip"
          name: 报销系统 v1.0.0 绿色版
          tag_name: v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
