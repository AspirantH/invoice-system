name: 编译 Windows 绿色单文件 exe

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装依赖
        run: npm install

      - name: 构建前端
        run: npm run build

      - name: 编译 Tauri 程序
        run: tauri build

      - name: 上传成品exe（仅单个文件）
        uses: actions/upload-artifact@v4
        with:
          name: invoice-system-exe
          path: src-tauri/target/release/invoice-system.exe
