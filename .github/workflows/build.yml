name: Windows Green Build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  NODE_VERSION: '20.11.1'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download Portable Node.js (Green Version)
      shell: pwsh
      run: |
        $NodeVersion = $env:NODE_VERSION
        $NodeUrl = "https://nodejs.org/dist/v$NodeVersion/node-v$NodeVersion-win-x64.zip"
        $OutputPath = "$env:RUNNER_TEMP\nodejs.zip"
        
        Write-Host "Downloading Node.js v$NodeVersion (portable)..."
        Invoke-WebRequest -Uri $NodeUrl -OutFile $OutputPath -UseBasicParsing
        
        Write-Host "Extracting Node.js..."
        Expand-Archive -Path $OutputPath -DestinationPath "$env:RUNNER_TEMP\nodejs" -Force
        
        $NodeDir = "$env:RUNNER_TEMP\nodejs\node-v$NodeVersion-win-x64"
        Write-Host "Node.js location: $NodeDir"
        
        # Add to PATH
        "$NodeDir" | Out-File -FilePath $env:GITHUB_PATH -Append
        "$env:GITHUB_PATH"
        
        # Verify
        & "$NodeDir\node.exe" --version
        & "$NodeDir\npm.cmd" --version
        
        # Store path for later steps
        "NODE_DIR=$NodeDir" | Out-File -FilePath $env:GITHUB_ENV -Append
    
    - name: Setup Node.js environment (portable)
      shell: pwsh
      run: |
        $NodeDir = $env:NODE_DIR
        
        # Configure npm to use portable node
        & "$NodeDir\npm.cmd" config set prefix "$env:RUNNER_TEMP\npm-global"
        
        # Create npm global directory
        New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\npm-global"
        
        # Add npm global to PATH
        "$env:RUNNER_TEMP\npm-global" | Out-File -FilePath $env:GITHUB_PATH -Append
        
        Write-Host "Node.js setup complete"
        & "$NodeDir\node.exe" --version
        & "$NodeDir\npm.cmd" --version
    
    - name: Cache node_modules
      uses: actions/cache@v4
      id: npm-cache
      with:
        path: |
          node_modules
          ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-
    
    - name: Install dependencies
      shell: pwsh
      run: |
        $NodeDir = $env:NODE_DIR
        & "$NodeDir\npm.cmd" ci
      env:
        npm_config_cache: ${{ runner.temp }}/npm-cache
    
    - name: Generate Prisma Client
      shell: pwsh
      run: |
        $NodeDir = $env:NODE_DIR
        & "$NodeDir\npx.cmd" prisma generate
    
    - name: Build Nuxt Application
      shell: pwsh
      run: |
        $NodeDir = $env:NODE_DIR
        & "$NodeDir\npm.cmd" run build
      env:
        NUXT_TELEMETRY_DISABLED: 1
        NODE_OPTIONS: --max-old-space-size=4096
    
    - name: Prepare Green Package
      shell: pwsh
      run: |
        $PackageName = "invoice-system-windows"
        $OutputDir = "$env:GITHUB_WORKSPACE\dist\$PackageName"
        $NodeDir = $env:NODE_DIR
        
        Write-Host "Creating green package..."
        
        # Create output directory structure
        New-Item -ItemType Directory -Force -Path "$OutputDir"
        New-Item -ItemType Directory -Force -Path "$OutputDir\data"
        
        # Copy built application (.output directory)
        if (Test-Path ".output") {
            Copy-Item -Path ".output" -Destination "$OutputDir\" -Recurse -Force
            Write-Host "Copied .output directory"
        } else {
            Write-Error ".output directory not found!"
            exit 1
        }
        
        # Copy essential runtime files
        Copy-Item -Path "package.json" -Destination "$OutputDir\" -Force
        if (Test-Path "prisma") {
            Copy-Item -Path "prisma" -Destination "$OutputDir\" -Recurse -Force
            Write-Host "Copied prisma directory"
        }
        
        # Copy node.exe (portable Node.js runtime)
        Copy-Item -Path "$NodeDir\node.exe" -Destination "$OutputDir\" -Force
        Write-Host "Copied node.exe"
        
        # Copy necessary DLLs for Node.js
        $Dlls = @("vcruntime140.dll", "vcruntime140_1.dll", "msvcp140.dll")
        foreach ($dll in $Dlls) {
            $DllPath = "$NodeDir\$dll"
            if (Test-Path $DllPath) {
                Copy-Item -Path $DllPath -Destination "$OutputDir\" -Force
                Write-Host "Copied $dll"
            }
        }
        
        # Create startup batch script
        $BatchContent = @"
@echo off
chcp 65001 >nul
title 个人报销管理系统
echo ==========================================
echo    个人报销管理系统 - Invoice System
echo ==========================================
echo.

REM Set data directory
set "DATA_DIR=%~dp0data"
set "DATABASE_URL=file:%DATA_DIR%\dev.db"

REM Check if database exists, if not initialize it
if not exist "%DATA_DIR%\dev.db" (
    echo 首次运行，正在初始化数据库...
    if exist "prisma\schema.prisma" (
        "%~dp0node.exe" "%~dp0.output\server\node_modules\prisma\build\index.js" db push --schema="%~dp0prisma\schema.prisma" --accept-data-loss
    )
    echo 数据库初始化完成！
    echo.
)

echo 启动服务中...
echo 访问地址: http://localhost:3000
echo.
echo 按 Ctrl+C 停止服务
echo.

REM Start the server
"%~dp0node.exe" "%~dp0.output\server\index.mjs"

pause
"@
        $BatchContent | Out-File -FilePath "$OutputDir\启动系统.bat" -Encoding UTF8
        
        # Create alternative PowerShell startup script
        $PsContent = @'
#Requires -Version 5.1
[Console]::OutputEncoding = [System.Text.Encoding]::UTF8
$Host.UI.RawUI.WindowTitle = "个人报销管理系统"

$scriptPath = Split-Path -Parent $MyInvocation.MyCommand.Path
$dataDir = Join-Path $scriptPath "data"
$env:DATABASE_URL = "file:$dataDir/dev.db"

Write-Host "==========================================" -ForegroundColor Cyan
Write-Host "   个人报销管理系统 - Invoice System" -ForegroundColor Cyan
Write-Host "==========================================" -ForegroundColor Cyan
Write-Host ""

# Initialize database if needed
if (-not (Test-Path "$dataDir/dev.db")) {
    Write-Host "首次运行，正在初始化数据库..." -ForegroundColor Yellow
    $prismaSchema = Join-Path $scriptPath "prisma/schema.prisma"
    if (Test-Path $prismaSchema) {
        & (Join-Path $scriptPath "node.exe") (Join-Path $scriptPath ".output/server/node_modules/prisma/build/index.js") db push --schema=$prismaSchema --accept-data-loss
    }
    Write-Host "数据库初始化完成！" -ForegroundColor Green
    Write-Host ""
}

Write-Host "启动服务中..." -ForegroundColor Green
Write-Host "访问地址: " -NoNewline
Write-Host "http://localhost:3000" -ForegroundColor Yellow
Write-Host ""
Write-Host "按 Ctrl+C 停止服务" -ForegroundColor Gray
Write-Host ""

$nodeExe = Join-Path $scriptPath "node.exe"
$serverScript = Join-Path $scriptPath ".output/server/index.mjs"
& $nodeExe $serverScript
'@
        $PsContent | Out-File -FilePath "$OutputDir\启动系统.ps1" -Encoding UTF8
        
        # Create README for green package
        $ReadmeContent = @"
# 个人报销管理系统 - Windows 绿色版

## 快速启动

### 方法一：双击启动（推荐）
直接双击运行 `启动系统.bat` 文件

### 方法二：PowerShell 启动
右键点击 `启动系统.ps1`，选择"使用 PowerShell 运行"

### 方法三：命令行启动
```cmd
启动系统.bat
```

## 访问系统

启动成功后，在浏览器中访问：
```
http://localhost:3000
```

## 数据存储

所有数据默认存储在 `data/` 目录下：
- `data/dev.db` - SQLite 数据库文件

## 系统要求

- Windows 10 或更高版本
- 无需安装 Node.js（已内置）
- 无需安装其他依赖

## 端口配置

默认使用 3000 端口，如需修改：
1. 编辑 `启动系统.bat`
2. 修改启动命令中的端口号

## 目录说明

```
invoice-system-windows/
├── node.exe              # Node.js 运行时（便携版）
├── 启动系统.bat          # Windows 批处理启动脚本
├── 启动系统.ps1          # PowerShell 启动脚本
├── package.json          # 项目配置
├── prisma/               # 数据库模型和迁移
│   └── schema.prisma
├── .output/              # 构建输出
│   └── server/
│       └── index.mjs     # 服务器入口
└── data/                 # 数据存储目录（自动创建）
    └── dev.db            # SQLite 数据库
```

## 注意事项

1. 首次启动会自动初始化数据库
2. 请勿删除 `node.exe` 和 `.output` 目录
3. 建议定期备份 `data/` 目录

## 技术支持

项目地址: https://github.com/AspirantH/invoice-system
"@
        $ReadmeContent | Out-File -FilePath "$OutputDir\README.md" -Encoding UTF8
        
        Write-Host "Green package prepared at: $OutputDir"
        
        # List contents
        Get-ChildItem -Path $OutputDir -Recurse | Select-Object -First 20
    
    - name: Create Portable ZIP Package
      shell: pwsh
      run: |
        $PackageName = "invoice-system-windows-v${{ github.ref_name }}"
        if ($PackageName -eq "invoice-system-windows-v") {
            $PackageName = "invoice-system-windows"
        }
        $SourceDir = "$env:GITHUB_WORKSPACE\dist\invoice-system-windows"
        $OutputZip = "$env:GITHUB_WORKSPACE\dist\$PackageName.zip"
        
        Write-Host "Creating ZIP package: $OutputZip"
        
        # Create ZIP with compression
        Compress-Archive -Path $SourceDir -DestinationPath $OutputZip -Force
        
        # Get file size
        $FileInfo = Get-Item $OutputZip
        Write-Host "Package created: $($FileInfo.Name)"
        Write-Host "Size: $([math]::Round($FileInfo.Length / 1MB, 2)) MB"
        
        # Output for artifact upload
        "ZIP_PATH=$OutputZip" | Out-File -FilePath $env:GITHUB_ENV -Append
        "PACKAGE_NAME=$PackageName" | Out-File -FilePath $env:GITHUB_ENV -Append
    
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PACKAGE_NAME }}
        path: dist/invoice-system-windows/
        retention-days: 30
    
    - name: Upload ZIP Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PACKAGE_NAME }}-zip
        path: ${{ env.ZIP_PATH }}
        retention-days: 30
    
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ env.ZIP_PATH }}
        name: Release ${{ github.ref_name }}
        body: |
          ## 个人报销管理系统 - Windows 绿色版
          
          ### 下载说明
          下载 `${{ env.PACKAGE_NAME }}.zip`，解压后双击 `启动系统.bat` 即可运行。
          
          ### 系统要求
          - Windows 10 或更高版本
          - 无需安装 Node.js（已内置便携版）
          - 无需安装其他依赖
          
          ### 快速开始
          1. 下载并解压 ZIP 文件
          2. 双击运行 `启动系统.bat`
          3. 浏览器访问 http://localhost:3000
          
          ### 数据存储
          所有数据存储在 `data/` 目录下的 SQLite 数据库中。
          
          ### 包含组件
          - Node.js v${{ env.NODE_VERSION }} (便携版)
          - Nuxt 3 应用（预构建）
          - Prisma 数据库引擎
          - 自动启动脚本
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Optional: Test on clean Windows environment
  test-clean-windows:
    needs: build-windows
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: invoice-system-windows
        path: test-package
    
    - name: Test Package Structure
      shell: pwsh
      run: |
        Write-Host "Testing package structure..."
        
        $RequiredFiles = @(
            "node.exe",
            "启动系统.bat",
            "启动系统.ps1",
            ".output/server/index.mjs",
            "package.json"
        )
        
        foreach ($file in $RequiredFiles) {
            $fullPath = Join-Path "test-package" $file
            if (Test-Path $fullPath) {
                Write-Host "[OK] $file" -ForegroundColor Green
            } else {
                Write-Host "[MISSING] $file" -ForegroundColor Red
                exit 1
            }
        }
        
        Write-Host "All required files present!" -ForegroundColor Green
    
    - name: Test Node.js Executable
      shell: pwsh
      run: |
        $nodeExe = "test-package/node.exe"
        if (Test-Path $nodeExe) {
            $version = & $nodeExe --version
            Write-Host "Node.js version: $version" -ForegroundColor Green
        } else {
            Write-Error "node.exe not found!"
            exit 1
        }
