name: 编译Windows绿色版(功能完整)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install

      - name: 构建项目
        run: npm run build

      - name: 打包完整程序
        uses: actions/upload-artifact@v4
        with:
          name: 报销系统-完整功能版
          path: |
            .output
            node_modules
            package.json
            prisma
            public
