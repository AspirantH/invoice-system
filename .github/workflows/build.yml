name: 编译并发布到 Releases

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装项目依赖
        run: npm install

      - name: 安装 Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: 构建前端（正常 build，保留 API）
        run: npm run build

      - name: 编译 Tauri
        run: tauri build

      - name: 发布 EXE 到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/invoice-system.exe
          name: 报销系统 v1.0.0
          tag_name: v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
