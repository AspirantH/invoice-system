name: 编译并打包ZIP（免安装绿色版）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装项目依赖
        run: npm install

      - name: 安装 Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: 构建前端
        run: npm run build

      - name: 编译 Tauri 生成 exe
        run: tauri build

      - name: 上传ZIP（仅单EXE）
        uses: actions/upload-artifact@v4
        with:
          name: 报销系统-绿色免安装版
          path: src-tauri/target/release/invoice-system.exe
