name: 编译Windows绿色单文件exe

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装依赖
        run: npm install

      - name: 安装tauri
        run: npm install -g @tauri-apps/cli

      - name: 构建前端
        run: npm run build

      - name: 生成单文件exe
        run: tauri build

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: invoice-system-windows-single-exe
          path: src-tauri/target/release/bundle/exe/
