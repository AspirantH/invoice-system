name: 构建绿色版
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install

      - name: 生成数据库
        run: npx prisma generate

      - name: 构建项目
        run: npm run build

      - name: 创建启动脚本
        run: |
          "@echo off" > 启动.bat
          "node.exe .output/server/index.mjs" >> 启动.bat

      - name: 复制 node.exe
        run: Copy-Item (Get-Command node).Source ./

      - name: 打包压缩
        run: Compress-Archive -Path @("node.exe","启动.bat",".output","prisma","package.json","dev.db") 报销系统.zip

      - name: 发布到 Releases
        uses: softprops/action-gh-release@v2
        with:
          files: 报销系统.zip
          name: 报销系统绿色版
          tag_name: v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
