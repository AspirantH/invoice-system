name: 最终绿色版(修复全部500)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install

      - name: 生成 Prisma
        run: npx prisma generate

      - name: 构建
        run: npm run build

      - name: 创建启动脚本
        run: |
          "@echo off" > 启动.bat
          "node.exe .output/server/index.mjs" >> 启动.bat

      - name: 复制 node.exe
        run: Copy-Item (Get-Command node).Source ./

      - name: 打包
        run: Compress-Archive -Path @("node.exe","启动.bat",".output","prisma","package.json") 报销系统.zip

      - name: 上传 Release
        uses: softprops/action-gh-release@v1
        with:
          files: 报销系统.zip
          tag_name: v1.0.0
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
