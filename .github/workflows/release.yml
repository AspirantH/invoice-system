name: 最终完美版
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装Node
        uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: 安装依赖
        run: npm install

      - name: 生成Prisma
        run: npx prisma generate

      - name: 创建数据库
        run: npx prisma db push

      - name: 构建项目
        run: npm run build

      - name: 创建启动脚本
        run: |
          "@echo off" > 启动.bat
          "node.exe .output/server/index.mjs" >> 启动.bat

      - name: 复制node.exe
        run: Copy-Item (Get-Command node).Source ./

      - name: 打包
        run: Compress-Archive -Path "node.exe","启动.bat",".output","prisma","package.json","dev.db" -DestinationPath "报销系统.zip"

      - name: 发布
        uses: softprops/action-gh-release@v1
        with:
          files: 报销系统.zip
          tag_name: v1.0.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
