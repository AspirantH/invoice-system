name: 最终完美绿色版
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装Node
        uses: actions/setup-node@v4
        with: {node-version: 20}

      - run: npm install
      - run: npx prisma generate
      - run: npm run build

      - name: 创建启动脚本
        run: |
          "@echo off" > 启动.bat
          "node.exe .output/server/index.mjs" >> 启动.bat

      - run: Copy-Item (Get-Command node).Source ./
      - run: Compress-Archive -Path @("node.exe","启动.bat",".output","prisma","package.json") 报销系统.zip

      - name: 发布
        uses: softprops/action-gh-release@v1
        with:
          files: 报销系统.zip
          tag_name: v1.0.0
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
